name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: xcodebuild (macOS 26.5)
    runs-on: macos-26-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --show-sdk-version --sdk macosx

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project my-cleaner.xcodeproj \
            -scheme my-cleaner \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build
